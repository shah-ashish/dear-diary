name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java JDK (v17 is required for modern Android Gradle builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 4. Install NPM dependencies
      - name: Install Dependencies
        run: npm ci || npm install

      # 5. Build Vite Web Bundle
      - name: Build Web Application
        run: npm run build

      # 6. Initialize & Sync Capacitor Android Platform
      - name: Capacitor Android Sync
        run: |
          # If the android folder is not committed to git, create it
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      # 7. Build Android Debug APK using Gradle
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 8. Upload the generated APK as a build artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dear-diary-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
